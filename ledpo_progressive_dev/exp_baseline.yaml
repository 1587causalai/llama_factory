# llamafactory-cli train ledpo_progressive_dev/exp_baseline.yaml
# python ledpo_progressive_dev/run_train_and_plot.py --config ledpo_progressive_dev/exp_baseline.yaml --wandb_project ledpo_exp

### model
model_name_or_path: /root/models/Qwen1.5-0.5B
trust_remote_code: true

### method
stage: foodpo
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: all
pref_beta: 0.1
pref_loss: sigmoid  # choices: [sigmoid (dpo), orpo, simpo]

#### dynamic beta
use_dynamic_beta: true

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true  # 使用bf16精度
ddp_timeout: 180000000
resume_from_checkpoint: null


### dataset
dataset: dpo_en_demo
dataset_dir: data
template: qwen
cutoff_len: 1024  # 对于小模型使用较小的上下文长度
# max_samples: 100
overwrite_cache: true
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: results/qwen15-0.5b/lora/foodpo
logging_steps: 5
save_steps: 100
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: [wandb]


### eval
eval_dataset: dpo_zh_demo
# val_size: 0.1
per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 5 



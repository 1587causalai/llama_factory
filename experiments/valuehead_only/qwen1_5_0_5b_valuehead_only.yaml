### model
model_name_or_path: /root/models/Qwen1.5-0.5B
trust_remote_code: true

### method
stage: ledpo
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: all
pref_beta: 0.73  # baseline 0.1
pref_loss: sigmoid  # choices: [sigmoid (dpo), orpo, simpo]
use_beta_head: true  # 控制是否使用value_head计算动态beta
beta_head_activation_fn: sigmoid  # 控制value_head最后一层激活函数, choices: [sigmoid, softplus, relu]

# 分离训练设置
freeze_policy: true  # 冻结策略网络参数，只训练 value_head
freeze_value_head: false  # 不冻结 value_head
value_head_lr_multiplier: 100.0  # value_head 学习率倍率

### dataset
dataset: hh_rlhf_en
template: qwen
cutoff_len: 1024  # 缩短长度以加快测试
max_samples: 1000  # 减少样本数量以加快测试
overwrite_cache: true
preprocessing_num_workers: 4

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 2
learning_rate: 1.0e-4  # 为模型参数的学习率
num_train_epochs: 1.0
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### output
output_dir: /root/LLaMA-Factory/saves/qwen1.5-0.5b/lora/ledpo_valuehead_only_experiment
logging_steps: 5
save_steps: 50
plot_loss: true
overwrite_output_dir: true
report_to: [wandb]
wandb_project: neural_ledpo

## eval
val_size: 0.1
per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 5 